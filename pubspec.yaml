name: qclaw_mobile
description: 口袋里的小龙虾 — QClaw Mobile AI 助手
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # 路由
  go_router: ^14.6.0

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 网络
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # 本地存储
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4

  # 数据模型
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Markdown 渲染
  flutter_markdown: ^0.7.4+1

  # 字体
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # 代码生成
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.2

flutter:
  uses-material-design: true
