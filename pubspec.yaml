name: mbot_mobile
description: "MBot Mobile - AI Agent 移动端"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 图标
  cupertino_icons: ^1.0.8

  # 路由
  go_router: ^17.1.0

  # 状态管理
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # 网络
  url_launcher: ^6.3.1
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # 本地数据库
  drift: ^2.23.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.0

  # 本地存储
  shared_preferences: ^2.3.4

  # JSON 序列化
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Markdown 渲染
  flutter_markdown: ^0.7.4+3

  # 字体
  google_fonts: ^8.0.2

  # 工具库
  intl: ^0.20.1
  uuid: ^4.5.1

  # 性能优化
  flutter_slidable: ^4.0.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # 推送通知
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1

  # UI 组件
  pinput: ^5.0.0
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码检查
  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  drift_dev: ^2.23.0
  mockito: ^5.6.4
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
