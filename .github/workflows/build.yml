name: Build APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Configure Chinese mirrors (workaround pub.dev instability)
        run: |
          export PUB_HOSTED_URL=https://pub.flutter-io.cn
          export FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn
          echo "Using Chinese mirrors for pub.dev"

      - name: Get dependencies
        run: flutter pub get

      - name: Clean build cache
        run: flutter clean

      - name: Analyze
        run: dart analyze lib/
        continue-on-error: true

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MBot-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag: v0.2.0-${{ github.sha_short }}
          name: MBot v0.2.0-${{ github.sha_short }}
          body: |
            📱 MBot Mobile — OpenClaw 移动端 AI Agent
            
            ## 功能
            - 内嵌 Node.js 运行时（libnode.so）
            - 自动安装 OpenClaw Gateway
            - 默认智谱 GLM 模型
            - 流式 AI 对话
            - 技能市场
            - 记忆管理
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: true
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
